name: Publish to PyPI

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: uv sync --extra dev
      - run: uv run pytest
      - run: uv build

  publish:
    needs: test

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: uv build
      - run: uv publish --token ${{ secrets.PYPI_API_TOKEN }}